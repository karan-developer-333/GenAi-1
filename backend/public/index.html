<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <h1>🧠 My Knowledge Base</h1>
                    <p id="item-count">Loading items...</p>
                </div>
                <div class="header-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="text">📝 Text</button>
                    <button class="filter-btn" data-filter="image">🖼️ Image</button>
                    <button class="filter-btn" data-filter="mixed">🔀 Mixed</button>
                </div>
                <div class="header-search">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" placeholder="Semantic search..." autocomplete="off">
                        <button id="clear-search" class="clear-btn" style="display: none;">✕</button>
                    </div>
                    <div id="suggestions-list" class="suggestions-list"></div>
                </div>
            </div>
        </header>

        <main id="items-grid" class="items-grid">
            <!-- Items injected by JS -->
        </main>
    </div>

    <script>
        let allItems = [];
        let activeFilter = 'all';

        async function fetchItems() {
            try {
                const response = await fetch('/api/items');
                allItems = await response.json();
                renderItems(allItems);
            } catch (err) {
                console.error('Failed to fetch items:', err);
                document.getElementById('item-count').textContent = 'Error loading data.';
            }
        }

        function applyFilter(filter) {
            activeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            const filtered = filter === 'all' ? allItems : allItems.filter(i => i.type === filter);
            renderItems(filtered);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function typeBadge(item) {
            const types = {
                article: { label: 'Article', icon: '📰', cls: 'badge-article' },
                tweet:   { label: 'Tweet',   icon: '🐦', cls: 'badge-tweet' },
                image:   { label: 'Image',   icon: '🖼️', cls: 'badge-image' },
                youtube: { label: 'YouTube', icon: '📺', cls: 'badge-youtube' },
                video:   { label: 'Video',   icon: '🎬', cls: 'badge-video' },
                pdf:     { label: 'PDF',     icon: '📄', cls: 'badge-pdf' }
            };
            const t = types[item.sourceType] || types.article;
            return `<span class="type-badge ${t.cls}">${t.icon} ${t.label}</span>`;
        }

        async function searchItems(query) {
            hideSuggestions();
            if (!query.trim()) {
                fetchItems();
                document.getElementById('clear-search').style.display = 'none';
                return;
            }

            document.getElementById('clear-search').style.display = 'block';
            document.getElementById('item-count').textContent = 'Searching...';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const results = await response.json();
                
                // When searching, we might ignore the type filter or apply it to results
                // For now, let's just show all search results
                renderItems(results, true); 
            } catch (err) {
                console.error('Search failed:', err);
                document.getElementById('item-count').textContent = 'Search error.';
            }
        }

        async function fetchSuggestions(query) {
            if (!query.trim()) {
                hideSuggestions();
                return;
            }
            try {
                const response = await fetch(`/api/suggestions?q=${encodeURIComponent(query)}`);
                const suggestions = await response.json();
                showSuggestions(suggestions);
            } catch (err) {
                console.error('Failed to fetch suggestions:', err);
            }
        }

        function showSuggestions(suggestions) {
            const list = document.getElementById('suggestions-list');
            if (suggestions.length === 0) {
                hideSuggestions();
                return;
            }
            list.innerHTML = suggestions.map(s => `<div class="suggestion-item">${escapeHtml(s)}</div>`).join('');
            list.style.display = 'block';

            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    searchInput.value = item.textContent;
                    searchItems(item.textContent);
                });
            });
        }

        function hideSuggestions() {
            document.getElementById('suggestions-list').style.display = 'none';
        }

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.header-search')) {
                hideSuggestions();
            }
        });

        let searchTimeout;
        let suggestionTimeout;
        const searchInput = document.getElementById('search-input');
        
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value;
            clearTimeout(searchTimeout);
            clearTimeout(suggestionTimeout);
            
            if (val.trim()) {
                document.getElementById('clear-search').style.display = 'block';
            } else {
                document.getElementById('clear-search').style.display = 'none';
                hideSuggestions();
            }

            suggestionTimeout = setTimeout(() => fetchSuggestions(val), 100);
            searchTimeout = setTimeout(() => searchItems(val), 800); // Slower debounce for full search
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(searchTimeout);
                clearTimeout(suggestionTimeout);
                searchItems(searchInput.value);
            }
        });

        function renderItems(items, isSearch = false) {
            const grid = document.getElementById('items-grid');
            const countEl = document.getElementById('item-count');

            const total = allItems.length;
            const showing = items.length;
            
            if (isSearch) {
                countEl.textContent = `Found ${showing} semantic match${showing !== 1 ? 'es' : ''}`;
            } else {
                countEl.textContent = activeFilter === 'all'
                    ? `${total} item${total !== 1 ? 's' : ''} saved`
                    : `Showing ${showing} of ${total}`;
            }

            if (items.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    <div class="empty-icon">${isSearch ? '🕵️' : '📭'}</div>
                    <p>${isSearch ? 'No semantic matches found for your query.' : (activeFilter === 'all' ? 'No items saved yet. Use the extension to save content!' : 'No items of this type.')}</p>
                </div>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                console.log(item)
                const date = new Date(item.timestamp).toLocaleString();
                const safeTitle = escapeHtml(item.title);
                const safeText = escapeHtml(item.selectedText);
                const safeNote = escapeHtml(item.note);
                const safeAlt  = escapeHtml(item.imageAlt);
                const safeUrl  = escapeHtml(item.url);

                const imageSection = item.imageUrl ? `
                    <div class="card-image-wrap">
                        <img src="${escapeHtml(item.imageUrl)}" alt="${safeAlt}"
                             onerror="this.parentElement.classList.add('img-error')"
                             loading="lazy" />
                        ${item.imageAlt ? `<div class="img-alt-overlay" title="Alt text: ${safeAlt}">
                            <span class="alt-label">ALT</span> ${safeAlt}
                        </div>` : `<div class="img-alt-overlay no-alt"><span class="alt-label">ALT</span> (no alt text)</div>`}
                    </div>` : '';

                const textSection = item.selectedText ? `
                    <div class="card-content">
                        <blockquote>${safeText}</blockquote>
                    </div>` : '';

                const noteSection = item.note ? `
                    <div class="card-note">
                        <span class="note-icon">💬</span> ${safeNote}
                    </div>` : '';

                // If it's a YouTube video, maybe show a "Watch" button or similar if no text
                const youtubeAction = (item.sourceType === 'youtube' && !item.selectedText) ? `
                    <div class="card-footer-action">
                        <a href="${safeUrl}" target="_blank" class="watch-btn">▶ Watch Video</a>
                    </div>` : '';

                return `
                <div class="card ${item.type} source-${item.sourceType}" id="card-${item.id}">
                    <div class="card-header">
                        <div class="card-meta">
                            ${typeBadge(item)}
                            <span class="timestamp">${date}</span>
                        </div>
                        <div class="card-actions">
                            <a href="${safeUrl}" target="_blank" class="source-link" title="${safeUrl}">
                                Source ↗
                            </a>
                            <button class="delete-btn" onclick="deleteItem('${item._id}')" title="Delete">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <h2 class="card-title">${safeTitle}</h2>
                    ${imageSection}
                    ${textSection}
                    ${youtubeAction}
                    ${noteSection}
                </div>`;
            }).join('');
        }

        async function deleteItem(id) {
            if (!confirm('Delete this saved item?')) return;
            try {
                const response = await fetch(`/api/items/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    allItems = allItems.filter(i => i.id !== id);
                    applyFilter(activeFilter);
                } else {
                    alert('Failed to delete item.');
                }
            } catch (err) {
                console.error('Error deleting item:', err);
                alert('Error connecting to server.');
            }
        }

        fetchItems();
        setInterval(fetchItems, 30000);
    </script>
</body>
</html>
