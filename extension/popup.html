<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save to Knowledge</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Save to Knowledge</h1>
            <div class="header-actions">
                <button id="settings-toggle" class="icon-btn" title="Settings">⚙️</button>
                <div class="status-indicator" id="status-indicator"></div>
            </div>
        </header>

        <!-- Settings Panel -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="field">
                <label for="user-id-input">Clerk User ID</label>
                <div class="input-with-hint">
                    <input type="text" id="user-id-input" placeholder="user_...">
                    <p class="hint">Find this in your Profile on the web app.</p>
                </div>
            </div>
            <button id="save-settings-btn" class="secondary-btn">Save Settings</button>
        </div>

        <main>
            <!-- Page Info -->
            <div class="field">
                <label>Page</label>
                <div id="page-info" class="readonly-info">
                   <div id="page-title" class="truncate">Loading...</div>
                   <div id="page-url" class="truncate secondary">...</div>
                </div>
            </div>

            <!-- Source Type Selector -->
            <div class="field">
                <label>Content Type</label>
                <div class="source-type-grid">
                    <button class="source-chip" data-type="article">
                        <span class="chip-icon">📰</span>
                        <span class="chip-label">Article</span>
                    </button>
                    <button class="source-chip" data-type="tweet">
                        <span class="chip-icon">🐦</span>
                        <span class="chip-label">Tweet</span>
                    </button>
                    <button class="source-chip" data-type="image">
                        <span class="chip-icon">🖼️</span>
                        <span class="chip-label">Image</span>
                    </button>
                    <button class="source-chip" data-type="youtube">
                        <span class="chip-icon">📺</span>
                        <span class="chip-label">YouTube</span>
                    </button>
                    <button class="source-chip" data-type="video">
                        <span class="chip-icon">🎬</span>
                        <span class="chip-label">Video</span>
                    </button>
                    <button class="source-chip" data-type="pdf">
                        <span class="chip-icon">📄</span>
                        <span class="chip-label">PDF</span>
                    </button>
                </div>
            </div>

            <!-- Image Picker (only for image type) -->
            <div id="image-section" class="field hidden">
                <label>Select Image from Page</label>
                <button id="select-image-btn" class="secondary-btn">
                    <span class="btn-icon">🖼️</span> Select Image
                </button>

                <div id="image-info-card" class="image-card hidden">
                    <div class="image-preview-wrap">
                        <img id="image-preview" src="" alt="" />
                    </div>
                    <div class="image-meta">
                        <div class="image-meta-row">
                            <span class="meta-label">Alt</span>
                            <span id="image-alt-display" class="meta-value">—</span>
                        </div>
                        <div class="image-meta-row">
                            <span class="meta-label">URL</span>
                            <span id="image-url-display" class="meta-value url-truncate">—</span>
                        </div>
                    </div>
                    <button id="clear-image-btn" class="clear-btn" title="Remove">✕</button>
                </div>

                <div id="picker-active-badge" class="picker-badge hidden">
                    <span class="pulse-dot"></span> Picker Active — click an image on the page
                </div>
            </div>

            <!-- Captured Content -->
            <div class="field" id="selection-field">
                <label for="selection-text">Captured Content</label>
                <textarea id="selection-text" placeholder="Select some text on the page..."></textarea>
            </div>

            <!-- Personal Note -->
            <div class="field">
                <label for="note-input">Note</label>
                <input type="text" id="note-input" placeholder="Add a tag or note (optional)">
            </div>
        </main>

        <footer>
            <button id="save-btn" class="primary-btn">Save to Knowledge</button>
            <div id="message" class="message"></div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
